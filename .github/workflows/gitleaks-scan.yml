name: gitleaks-scan
# v2 (2026-07-08, Kael) — hardened per the 34-seed-PR review findings:
#  P1 config-tamper: scan uses the ORG-CANONICAL config fetched from guardian main
#     (--config overrides any repo-local .gitleaks.toml a PR could ship).
#  P2 fork/TOCTOU: scan the IMMUTABLE event SHA (refs/pull/N/head for PRs, github.sha
#     for pushes) — never a movable branch name.
#  P2 token-in-URL: auth via http.extraheader, not embedded in the remote URL.
#  P2 checksum: exact sha256 -c line, not substring grep.
# Still run-only: the org selected-actions allowlist rejects `uses:` actions.

on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  gitleaks-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: 8.21.2
      GITLEAKS_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      SCAN_REF: ${{ github.event_name == 'pull_request' && format('refs/pull/{0}/head', github.event.pull_request.number) || github.sha }}
    steps:
      - name: Fetch gitleaks (checksum-verified, exact match)
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tgz "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          echo "${GITLEAKS_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
      - name: Fetch org-canonical config (PR cannot tamper)
        run: |
          set -euo pipefail
          curl -fsSL -H "Authorization: Bearer ${GH_TOKEN}" -H "Accept: application/vnd.github.raw" \
            "https://api.github.com/repos/empire-mind/guardian/contents/security/gitleaks-canonical.toml?ref=kael/mbp-local-main-20260707" \
            -o gitleaks-canonical.toml
          test -s gitleaks-canonical.toml
      - name: Clone at immutable SHA (extraheader auth, full history)
        run: |
          set -euo pipefail
          git init -q repo && cd repo
          AUTH=$(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 | tr -d '\n')
          git config http."https://github.com/".extraheader "AUTHORIZATION: basic ${AUTH}"
          git remote add origin "https://github.com/${REPO}.git"
          git fetch -q origin "${SCAN_REF}"
          git checkout -q FETCH_HEAD
          git fetch -q origin --unshallow 2>/dev/null || git fetch -q origin || true
      - name: Scan with canonical config
        run: |
          set -euo pipefail
          cd repo
          ../gitleaks git . --config ../gitleaks-canonical.toml --redact --no-banner --exit-code 1
          echo "gitleaks: no leaks found at ${SCAN_REF}"
